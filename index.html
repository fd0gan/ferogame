<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Büşra'ya Özel</title>
    <style>
        :root {
            --primary-pink: #ff6b81;
            --accent-pink: #ff4757;
            --bg-gradient: linear-gradient(180deg, #fff0f3 0%, #ffe4e8 100%);
            --soft-white: rgba(255, 255, 255, 0.9);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            background: var(--bg-gradient);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
            color: #4a4a4a;
        }

        /* Header / Score Board */
        #header {
            padding: 20px 0;
            text-align: center;
            z-index: 100;
        }

        .score-container {
            display: inline-block;
            background: var(--soft-white);
            padding: 8px 20px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.15);
            border: 2px solid #fff;
        }

        #score-text {
            font-weight: 800;
            color: var(--accent-pink);
            font-size: 1.2rem;
            letter-spacing: 0.5px;
        }

        /* Game Area */
        #game-area {
            position: relative;
            flex-grow: 1;
            width: 100%;
            z-index: 10;
        }

        .heart {
            position: absolute;
            font-size: 60px;
            cursor: grab;
            user-select: none;
            touch-action: none;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 5px 10px rgba(255, 71, 87, 0.3));
            will-change: transform, left, top;
        }

        .decor-bear {
            position: absolute;
            font-size: 35px;
            opacity: 0.2;
            z-index: 5;
            pointer-events: none;
        }

        /* Bottom Target Area */
        #target-area {
            height: 25vh;
            background: var(--soft-white);
            border-top: 3px solid #fff;
            border-radius: 40px 40px 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 80;
            box-shadow: 0 -10px 30px rgba(255, 107, 129, 0.1);
            backdrop-filter: blur(10px);
        }

        #gift-box-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #gift-box {
            font-size: 80px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .box-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,107,129,0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 0.8; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        #gift-box.bounce {
            transform: scale(1.4) rotate(8deg);
        }

        .hint {
            margin-top: 8px;
            font-size: 0.9rem;
            color: #777;
            font-weight: 600;
        }

        /* Final Screen */
        #final-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bear-hero {
            font-size: 100px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 2rem;
            color: var(--accent-pink);
            margin: 10px 0;
        }

        .sub-message {
            font-size: 1.1rem;
            color: #555;
            margin: 15px 0;
        }

        .flower-bed {
            font-size: 3rem;
            margin-bottom: 25px;
        }

        #restart-btn {
            background: var(--accent-pink);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 2100;
        }
    </style>
</head>
<body>

    <div id="header">
        <div class="score-container">
            <span id="score-text">🧸 Büşra için: <span id="score">0</span> / 12</span>
        </div>
    </div>

    <div id="game-area"></div>

    <div id="target-area">
        <div id="gift-box-wrapper">
            <div class="box-glow"></div>
            <div id="gift-box">🎁</div>
        </div>
        <div class="hint">Kalpleri kutuya taşı Büşra ✨</div>
    </div>

    <div id="final-screen">
        <div class="bear-hero">🧸👑</div>
        <h1 class="title">Tebrikler Büşra Sultan !</h1>
        <div class="sub-message">Bunu hak ettin o zaman !<br><strong>Bu çiçekler sana...</strong></div>
        <div class="flower-bed">🌹🌷🌸🌺🌻</div>
        <button id="restart-btn" onclick="location.reload()">Baştan Başla ❤️</button>
    </div>

    <script>
        const gameArea = document.getElementById('game-area');
        const giftBox = document.getElementById('gift-box');
        const scoreDisplay = document.getElementById('score');
        const finalScreen = document.getElementById('final-screen');
        const targetArea = document.getElementById('target-area');

        let score = 0;
        const goal = 12;
        let activeHeart = null;
        let startX, startY, heartX, heartY;

        function addDecor() {
            for(let i=0; i<6; i++) {
                const bear = document.createElement('div');
                bear.className = 'decor-bear';
                bear.innerHTML = '🧸';
                bear.style.left = Math.random() * 90 + 'vw';
                bear.style.top = Math.random() * 50 + 'vh';
                gameArea.appendChild(bear);
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = ['❤️', '💖', '💝', '💕'][Math.floor(Math.random() * 4)];
            
            // X: Ekran genişliği içinde
            const x = Math.random() * (window.innerWidth - 80) + 10;
            // Y: Üstten %15 ile %45 arası (Kafadan aşağıda kalmaması için)
            const y = (Math.random() * (window.innerHeight * 0.3)) + (window.innerHeight * 0.1);
            
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';

            heart.addEventListener('touchstart', onStart, {passive: false});
            heart.addEventListener('mousedown', onStart);

            gameArea.appendChild(heart);
            animateFloating(heart);
        }

        function animateFloating(el) {
            let angle = Math.random() * Math.PI * 2;
            function step() {
                if (activeHeart !== el && el.parentElement) {
                    angle += 0.03;
                    el.style.transform = `translateY(${Math.sin(angle) * 12}px) rotate(${Math.cos(angle) * 4}deg)`;
                    requestAnimationFrame(step);
                }
            }
            requestAnimationFrame(step);
        }

        function onStart(e) {
            e.preventDefault();
            activeHeart = e.target;
            const point = e.type.includes('touch') ? e.touches[0] : e;
            const rect = activeHeart.getBoundingClientRect();
            
            startX = point.clientX;
            startY = point.clientY;
            heartX = rect.left;
            heartY = rect.top;

            activeHeart.style.zIndex = '1000';
            activeHeart.style.transform = 'scale(1.3)';
        }

        function onMove(e) {
            if (!activeHeart) return;
            const point = e.type.includes('touch') ? e.touches[0] : e;
            const dx = point.clientX - startX;
            const dy = point.clientY - startY;

            activeHeart.style.left = (heartX + dx) + 'px';
            activeHeart.style.top = (heartY + dy) + 'px';

            checkCapture(point.clientX, point.clientY);
        }

        function onEnd() {
            if (activeHeart) {
                activeHeart.style.zIndex = '50';
                activeHeart.style.transform = 'scale(1)';
                activeHeart = null;
            }
        }

        function checkCapture(x, y) {
            const targetRect = targetArea.getBoundingClientRect();
            if (y > targetRect.top) {
                const captured = activeHeart;
                activeHeart = null;
                
                score++;
                scoreDisplay.innerText = score;
                giftBox.classList.add('bounce');
                setTimeout(() => giftBox.classList.remove('bounce'), 200);

                captured.style.transition = 'all 0.3s ease-out';
                captured.style.transform = 'scale(0)';
                setTimeout(() => captured.remove(), 300);

                if (score >= goal) {
                    setTimeout(finishGame, 500);
                } else {
                    setTimeout(createHeart, 200);
                }
            }
        }

        function finishGame() {
            finalScreen.style.display = 'flex';
            setInterval(() => {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerHTML = ['🌸', '✨', '💖', '🌹'][Math.floor(Math.random() * 4)];
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = '-50px';
                p.style.fontSize = '25px';
                document.body.appendChild(p);
                p.animate([{ top: '-50px', opacity: 1 }, { top: '110vh', opacity: 0 }], { duration: 3000 }).onfinish = () => p.remove();
            }, 300);
        }

        window.addEventListener('mousemove', onMove);
        window.addEventListener('touchmove', onMove, {passive: false});
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchend', onEnd);

        window.onload = () => {
            addDecor();
            createHeart();
            setTimeout(createHeart, 600);
        };
    </script>
</body>
</html>
